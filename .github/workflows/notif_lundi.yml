name: Notification push lundi matin

on:
  schedule:
    - cron: '0 6 * * 1'   # Chaque lundi 8h heure française (6h UTC)
  workflow_dispatch:        # Permet aussi un déclenchement manuel pour tester

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install pywebpush
      - name: Envoi des notifications
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: python scripts/send_push_lundi.py
