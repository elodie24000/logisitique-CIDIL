name: Mise à jour prix RNM Nantes

on:
  schedule:
    - cron: '0 5 * * 1'  # Chaque lundi à 7h heure française (5h UTC)
  workflow_dispatch:       # Permet aussi de lancer manuellement

jobs:
  update-prix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mise à jour prix RNM
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/update_prix_rnm.py
